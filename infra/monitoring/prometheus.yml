global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "algo-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "algo-celery"
    static_configs:
      - targets: ["host.docker.internal:9808"]

  - job_name: "timescaledb"
    static_configs:
      - targets: ["timescaledb:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["host.docker.internal:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
